site_name: Flyokai Marketplace for Shopware
site_description: Multi-seller marketplace plugin suite for Shopware 6 — documentation
site_url: https://marketplace.flyokai.com/
repo_url: https://github.com/flyokai/flyokai
repo_name: flyokai/flyokai
edit_uri: blob/main/marketplace-docs/docs/

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme)"
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github

extra_css:
  - assets/flyokai.css

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Architecture: architecture.md
  - Domain model: concepts.md
  - Cart & checkout: cart-and-checkout.md
  - Seller portal: seller-portal.md
  - Admin (operator): admin.md
  - Statements & payouts: finance.md
  - Messaging: mail.md
  - Bulk import/export: bulk-import-export.md
  - Going remote: remote.md
  - Data migration: data-migration.md
  - Configuration: configuration.md
  - CLI commands: cli.md
  - Glossary: glossary.md
  - Troubleshooting: troubleshooting.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/flyokai
